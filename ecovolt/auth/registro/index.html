<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Evocolt — Crear cuenta</title>
  <link rel="stylesheet" href="../../shared/global.css"/>
  <link rel="stylesheet" href="../../shared/components.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="page-center">
    <div class="phone-frame">

      <!-- Logo -->
      <div class="logo-centered">
        <a href="../tipo-cuenta/index.html" class="back-btn" title="Volver">←</a>
        <div class="logo-circle">
          <svg viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="14" r="8" stroke="#2e8b57" stroke-width="1.5"/>
            <path d="M20 24C11 24 6 28 6 32" stroke="#2e8b57" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M20 24C29 24 34 28 34 32" stroke="#2e8b57" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="brand-name">Evocolt</span>
      </div>

      <!-- Body -->
      <div class="phone-body">

        <!-- Chip tipo de cuenta -->
        <div class="account-chip" id="accountChip">
          <span id="chipIcon">🏠</span>
          <span id="chipLabel">Persona de Hogar</span>
          <a href="../tipo-cuenta/index.html" class="chip-change">Cambiar</a>
        </div>

        <h1 class="screen-title">Crear<br>cuenta</h1>
        <p class="screen-sub">Ingresa tus datos para comenzar a controlar tu consumo energético.</p>

        <div class="input-group">
          <label class="input-label">Usuario</label>
          <input class="input-field" type="text" placeholder="Ej. carlos_garcia" id="username"/>
        </div>

        <div class="input-group">
          <label class="input-label">Correo electrónico</label>
          <input class="input-field" type="email" placeholder="correo@ejemplo.com" id="email"/>
        </div>

        <div class="input-group">
          <label class="input-label">Contraseña</label>
          <div class="pass-wrap">
            <input class="input-field" type="password" placeholder="Mínimo 8 caracteres" id="password"/>
            <button class="pass-toggle" onclick="togglePass()" type="button">👁</button>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Confirmar contraseña</label>
          <input class="input-field" type="password" placeholder="Repite tu contraseña" id="confirm"/>
        </div>

        <button class="btn-primary" onclick="goNext()">Crear cuenta</button>

        <div class="divider">¿Ya tienes cuenta?</div>

        <a href="../login/index.html">
          <button class="btn-secondary">Iniciar sesión</button>
        </a>
      </div>

    </div>
  </div>

  <script>
    // Leer tipo de cuenta guardado
    const type = sessionStorage.getItem('accountType') || 'hogar';
    const map = {
      hogar:      { icon: '🏠', label: 'Persona de Hogar',  next: '../../onboarding/configurar-hogar/index.html' },
      empresa:    { icon: '🏢', label: 'Empresa',           next: '../../onboarding/configurar-hogar/index.html' },
      estudiante: { icon: '🎓', label: 'Estudiante',        next: '../../onboarding/configurar-hogar/index.html' },
    };
    document.getElementById('chipIcon').textContent  = map[type].icon;
    document.getElementById('chipLabel').textContent = map[type].label;

    function togglePass() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    }

    function goNext() {
      const u = document.getElementById('username').value.trim();
      const e = document.getElementById('email').value.trim();
      const p = document.getElementById('password').value;
      const c = document.getElementById('confirm').value;
      if (!u || !e || !p) { alert('Completa todos los campos.'); return; }
      if (p !== c) { alert('Las contraseñas no coinciden.'); return; }
      sessionStorage.setItem('user', JSON.stringify({ username: u, email: e, type }));
      window.location.href = map[type].next;
    }
  </script>
</body>
</html>
