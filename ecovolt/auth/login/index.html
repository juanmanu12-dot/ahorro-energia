<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Evocolt — Iniciar sesión</title>
  <link rel="stylesheet" href="../../shared/global.css"/>
  <link rel="stylesheet" href="../../shared/components.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="page-center">
    <div class="phone-frame">

      <!-- Logo + botón volver -->
      <div class="logo-centered">
        <a href="../tipo-cuenta/index.html" class="back-btn" title="Volver">←</a>
        <div class="logo-circle">
          <svg viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="14" r="8" stroke="#2e8b57" stroke-width="1.5"/>
            <path d="M20 24C11 24 6 28 6 32" stroke="#2e8b57" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M20 24C29 24 34 28 34 32" stroke="#2e8b57" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="brand-name">Evocolt</span>
      </div>

      <div class="phone-body">

        <!-- Chip tipo de cuenta -->
        <div class="account-chip">
          <span id="chipIcon">🏠</span>
          <span id="chipLabel">Persona de Hogar</span>
          <a href="../tipo-cuenta/index.html" class="chip-change">Cambiar</a>
        </div>

        <h1 class="screen-title">Iniciar<br>sesión</h1>
        <p class="screen-sub">Bienvenido de nuevo. Ingresa tus datos para continuar.</p>

        <div class="input-group">
          <label class="input-label">Correo electrónico</label>
          <input class="input-field" type="email" placeholder="correo@ejemplo.com" id="email"/>
        </div>

        <div class="input-group">
          <label class="input-label">Contraseña</label>
          <div class="pass-wrap">
            <input class="input-field" type="password" placeholder="Tu contraseña" id="password"/>
            <button class="pass-toggle" onclick="togglePass()" type="button">👁</button>
          </div>
        </div>

        <div class="forgot-row">
          <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <button class="btn-primary" onclick="doLogin()">Ingresar</button>

        <div class="divider">¿No tienes cuenta?</div>

        <a href="../tipo-cuenta/index.html">
          <button class="btn-secondary">Crear cuenta nueva</button>
        </a>

      </div>
    </div>
  </div>

  <script>
    const type = sessionStorage.getItem('accountType') || 'hogar';
    const map = {
      hogar:      { icon: '🏠', label: 'Persona de Hogar', dash: '../../hogar/inicio/index.html' },
      empresa:    { icon: '🏢', label: 'Empresa',          dash: '../../empresa/inicio/index.html' },
      estudiante: { icon: '🎓', label: 'Estudiante',       dash: '../../estudiante/inicio/index.html' },
    };
    document.getElementById('chipIcon').textContent  = map[type].icon;
    document.getElementById('chipLabel').textContent = map[type].label;

    function togglePass() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    }

    function doLogin() {
      const e = document.getElementById('email').value.trim();
      const p = document.getElementById('password').value;
      if (!e || !p) { alert('Ingresa tu correo y contraseña.'); return; }
      window.location.href = map[type].dash;
    }
  </script>
</body>
</html>
