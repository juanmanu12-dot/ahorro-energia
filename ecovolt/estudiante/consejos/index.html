<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Evocolt — Consejos de ahorro</title>
  <link rel="stylesheet" href="../../shared/global.css"/>
  <link rel="stylesheet" href="../../shared/components.css"/>
  <link rel="stylesheet" href="../../shared/profile-menu.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="page-center"><div class="phone-frame">

  <div class="top-bar">
    <div class="logo-row">
      <a href="../inicio/index.html" class="back-link">←</a>
      <span class="page-title">Consejos de ahorro</span>
    </div>
    <div class="avatar-wrap">
      <button class="avatar-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="#2e8b57" stroke-width="1.5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#2e8b57" stroke-width="1.5" stroke-linecap="round"/></svg></button>
    </div>
  </div>

  <div class="phone-body">

    <!-- ── Consejo del día: CARRUSEL ── -->
    <div class="carousel-section">
      <div class="carousel-header">
        <span class="carousel-label">💡 Consejo del día</span>
        <div class="carousel-dots" id="todDots"></div>
      </div>

      <!-- Track deslizable -->
      <div class="carousel-viewport" id="todViewport">
        <div class="carousel-track" id="todTrack">
          <!-- Cards inyectadas por JS -->
        </div>
      </div>

      <div class="carousel-nav">
        <button class="carousel-btn" id="todPrev" onclick="slideTod(-1)">‹</button>
        <span class="carousel-pos" id="todPos">1 / 4</span>
        <button class="carousel-btn" id="todNext" onclick="slideTod(1)">›</button>
      </div>
    </div>

    <!-- ── Filtros por categoría ── -->
    <div class="cat-tabs" id="catTabs">
      <button class="cat-tab active" onclick="filterCat('all',this)">Todos</button>
      <button class="cat-tab" onclick="filterCat('electro',this)">⚡ Electrónica</button>
      <button class="cat-tab" onclick="filterCat('habitos',this)">🔁 Hábitos</button>
      <button class="cat-tab" onclick="filterCat('eco',this)">🌱 Eco</button>
    </div>

    <!-- ── Carrusel de tarjetas por categoría ── -->
    <div class="tips-carousel-wrap">
      <div class="tips-carousel-viewport">
        <div class="tips-carousel-track" id="tipsTrack">
          <!-- Cards inyectadas por JS -->
        </div>
      </div>
      <div class="tips-carousel-nav">
        <button class="carousel-btn sm" onclick="slideCards(-1)">‹</button>
        <div class="tips-dots" id="tipsDots"></div>
        <button class="carousel-btn sm" onclick="slideCards(1)">›</button>
      </div>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="../inicio/index.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="#6b7c74" stroke-width="1.5"/></svg>Inicio</a>
    <a href="../aparatos/index.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="#6b7c74" stroke-width="1.5"/></svg>Aparatos</a>
    <a href="../simulador/index.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18" stroke="#6b7c74" stroke-width="1.5"/></svg>Simular</a>
    <div class="nav-item active"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#2e8b57" stroke-width="1.5" fill="#e8f5ee"/><path d="M12 8v4m0 4h.01" stroke="#2e8b57" stroke-width="1.5" stroke-linecap="round"/></svg>Consejos</div>
  </nav>

</div></div>
<script src="../../shared/profile-menu.js"></script>
<script>
/* ── Datos ── */
const TOD = [
  { icon:'🔌', text:'Carga tu laptop de noche y desconéctala al terminar. El cargador sigue consumiendo hasta 2W enchufado.', save:'~$3.200/mes', color:'#1a5c3a' },
  { icon:'☀️', text:'Aprovecha la luz natural al estudiar. Abrir las persianas puede ahorrarte 2-3 horas de iluminación eléctrica al día.', save:'~$1.800/mes', color:'#2e7a4a' },
  { icon:'💻', text:'Activa el modo de bajo consumo en tu laptop mientras estudias. Reduce el consumo de la CPU hasta un 30%.', save:'~$2.100/mes', color:'#1f6e3e' },
  { icon:'🌀', text:'Apaga el ventilador cuando salgas de la habitación. Aunque sea por 30 minutos, el ahorro acumulado es real.', save:'~$2.400/mes', color:'#174f30' },
];

const ALL_TIPS = [
  { cat:'electro', icon:'💻', title:'Modo ahorro en laptop',     desc:'Activa el modo de ahorro de energía. Reduce el consumo hasta un 30% en uso normal.', saving:'$2.100/mes', dificultad:'Fácil',  color:'#e8f0fa' },
  { cat:'electro', icon:'📱', title:'Desconecta el cargador',    desc:'El cargador consume hasta 2W aunque el celular ya esté al 100%. ¡Desenchúfalo!', saving:'$800/mes',  dificultad:'Fácil',  color:'#e8f5ee' },
  { cat:'electro', icon:'💡', title:'Cambia a LEDs',             desc:'Una bombilla LED consume hasta 80% menos que una incandescente con la misma luz.', saving:'$4.500/mes', dificultad:'Media',  color:'#fdf8e8' },
  { cat:'electro', icon:'🖥️', title:'Apaga el monitor',          desc:'Más de 10 minutos fuera: apaga el monitor. Los salvapantallas consumen casi igual.', saving:'$1.800/mes', dificultad:'Fácil',  color:'#f0e8f8' },
  { cat:'habitos', icon:'🔌', title:'Regleta con interruptor',   desc:'Conecta tus aparatos a una regleta y apaga todo de un solo clic al salir.', saving:'$3.600/mes', dificultad:'Fácil',  color:'#e8f5ee' },
  { cat:'habitos', icon:'🌀', title:'Ventilador inteligente',    desc:'Un ventilador solo es útil si estás presente. Apágalo, aunque salgas 5 minutos.', saving:'$2.400/mes', dificultad:'Fácil',  color:'#e8f0fa' },
  { cat:'habitos', icon:'☀️', title:'Luz natural al estudiar',   desc:'Ubícate cerca de una ventana en el día. Ahorras horas de iluminación artificial.', saving:'$1.200/mes', dificultad:'Fácil',  color:'#fdf8e8' },
  { cat:'habitos', icon:'⏰', title:'Fuera de horas pico',       desc:'Usa electrodomésticos pesados (lavadora, microondas) antes de las 6 PM para ahorrar en la factura compartida.', saving:'$5.000/mes', dificultad:'Media',  color:'#fde8e8' },
  { cat:'eco',     icon:'🌱', title:'Streaming en SD',           desc:'Ver video en HD consume 3× más energía que en SD. Baja la calidad cuando no importa.', saving:'$1.500/mes', dificultad:'Fácil',  color:'#e8f5ee' },
  { cat:'eco',     icon:'✈️', title:'Modo avión al dormir',      desc:'Activa el modo avión mientras duermes. Ahorra batería y reduce la carga de red.', saving:'$600/mes',  dificultad:'Fácil',  color:'#e8f0fa' },
  { cat:'eco',     icon:'🌡️', title:'24°C es suficiente',        desc:'Cada grado adicional de A/C sube el consumo un 8%. Mantén 24°C y usa ropa cómoda.', saving:'$8.000/mes', dificultad:'Media',  color:'#fdf8e8' },
];

/* ── Carrusel TOD ── */
let todIdx = 0;

function buildTod() {
  const track = document.getElementById('todTrack');
  const dots  = document.getElementById('todDots');
  track.innerHTML = TOD.map((t,i) => `
    <div class="tod-card" style="background:${t.color}">
      <div class="tod-icon">${t.icon}</div>
      <div class="tod-text">${t.text}</div>
      <div class="tod-save">💰 ${t.save}</div>
    </div>
  `).join('');
  dots.innerHTML = TOD.map((_,i) => `<span class="dot ${i===0?'active':''}"></span>`).join('');
  document.getElementById('todPos').textContent = `1 / ${TOD.length}`;
}

function slideTod(dir) {
  todIdx = (todIdx + dir + TOD.length) % TOD.length;
  const w = document.getElementById('todViewport').offsetWidth;
  document.getElementById('todTrack').style.transform = `translateX(-${todIdx * w}px)`;
  document.getElementById('todPos').textContent = `${todIdx+1} / ${TOD.length}`;
  document.querySelectorAll('#todDots .dot').forEach((d,i) => d.classList.toggle('active', i===todIdx));
}

// Touch/swipe support
function addSwipe(viewportId, slideFn) {
  const el = document.getElementById(viewportId);
  let sx = 0;
  el.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive:true });
  el.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) > 40) slideFn(dx < 0 ? 1 : -1);
  });
}

/* ── Carrusel tips ── */
let tipsIdx = 0;
let activeCat = 'all';
let filtered = [];

function filterCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  tipsIdx = 0;
  buildTips();
}

function buildTips() {
  filtered = activeCat === 'all' ? ALL_TIPS : ALL_TIPS.filter(t => t.cat === activeCat);
  const track = document.getElementById('tipsTrack');
  const dots  = document.getElementById('tipsDots');

  track.innerHTML = filtered.map(t => `
    <div class="tip-card" style="background:${t.color}">
      <div class="tip-top">
        <span class="tip-icon">${t.icon}</span>
        <span class="tip-level">${t.dificultad}</span>
      </div>
      <div class="tip-title">${t.title}</div>
      <div class="tip-desc">${t.desc}</div>
      <div class="tip-saving">💰 ${t.saving}</div>
    </div>
  `).join('');

  dots.innerHTML = filtered.map((_,i) => `<span class="dot ${i===0?'active':''}"></span>`).join('');
  goToTip(0);
}

function goToTip(idx) {
  tipsIdx = Math.max(0, Math.min(idx, filtered.length - 1));
  const w = document.querySelector('.tips-carousel-viewport').offsetWidth;
  document.getElementById('tipsTrack').style.transform = `translateX(-${tipsIdx * w}px)`;
  document.querySelectorAll('#tipsDots .dot').forEach((d,i) => d.classList.toggle('active', i===tipsIdx));
}

function slideCards(dir) { goToTip(tipsIdx + dir); }

/* ── Init ── */
buildTod();
buildTips();
addSwipe('todViewport', slideTod);
addSwipe('tips-carousel-viewport', slideCards); // fallback — attached below
document.querySelector('.tips-carousel-viewport').addEventListener('touchstart', e => { window._tsx = e.touches[0].clientX; }, { passive:true });
document.querySelector('.tips-carousel-viewport').addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - (window._tsx||0);
  if (Math.abs(dx) > 40) slideCards(dx < 0 ? 1 : -1);
});
</script>
</body>
</html>
